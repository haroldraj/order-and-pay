spring:
  application:
    name: 'order-and-pay-order-service'

  jpa:
    hibernate:
      ddl-auto: none

  datasource:
    url: jdbc:postgresql://localhost:5441/order_db
    username: user_order_db
    password: password_order_db

springdoc:
  swagger-ui:
    path: /api

server:
  port: 5451

logging:
  level:
    org.springframework: DEBUG

services:
    restaurant:
      base-url: http://localhost:5454/restaurants
      endpoints:
        get-restaurant: /{id}

    address:
      base-url: http://localhost:5450/adresses
      endpoints:
        get-address: /{addressId}


kafka:
  topics:
    order-created: order.created
    payment-requested: payment.requested
    delivery-requested: delivery.requested