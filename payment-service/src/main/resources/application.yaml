spring:
  application:
    name: 'order-and-pay-payment-service'

  jpa:
    hibernate:
      ddl-auto: none

  datasource:
    url: jdbc:postgresql://localhost:5442/payment_db
    username: user_payment_db
    password: password_payment_db

  kafka:
    bootstrap-servers: localhost:9191

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: payment-group

    properties:
      spring:
        json:
          trusted:
            packages: "com.hrajaona.*"


springdoc:
  swagger-ui:
    path: /swagger-ui

server:
  port: 5452

logging:
  level:
    org.springframework: INFO

kafka:
  topics:
    order-created: order.created
    payment-events: payment.events
    payment-failed: payment.failed

  group-id:
    payment: payment-group