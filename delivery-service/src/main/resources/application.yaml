spring:
  application:
    name: 'order-and-pay-delivery-service'
  jpa:
    hibernate:
      ddl-auto: none

  datasource:
    url: jdbc:postgresql://localhost:5443/delivery_db
    username: user_delivery_db
    password: password_delivery_db

  kafka:
    bootstrap-servers: localhost:9191

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: delivery-group

    properties:
      spring:
        json:
          trusted:
            packages: "com.hrajaona.*"

springdoc:
  swagger-ui:
    path: /api

server:
  port: 5453

logging:
  level:
    org.springframework: DEBUG